<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>focusflow — 포모도로 타이머</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <a class="brand" href="#"><span>f</span>focusflow</a>
        <p id="today">오늘</p>
      </header>

      <section class="timer" aria-label="Pomodoro timer">
        <div class="mode-tabs" role="tablist">
          <button class="mode active" data-mode="pomodoro">집중</button>
          <button class="mode" data-mode="break">휴식</button>
        </div>
        <p class="mode-label" id="mode-label">집중 시간</p>
        <div class="current-goal" id="current-goal" aria-live="polite" hidden>
          <span class="current-goal-label">현재 목표</span>
          <strong id="current-goal-name"></strong>
        </div>
        <div class="dial">
          <svg viewBox="0 0 300 300" aria-hidden="true">
            <circle class="dial-base" cx="150" cy="150" r="132" />
            <circle class="dial-progress" id="dial-progress" cx="150" cy="150" r="132" />
          </svg>
          <input class="timer-input" id="time" type="text" value="25:00" inputmode="numeric" aria-label="타이머 시간. 분:초 형식으로 입력하세요. 최대 99분 59초" />
          <div class="overtime" id="overtime" aria-live="polite" hidden>
            <span>마무리 중</span>
            <strong id="overtime-time">+00:00</strong>
            <small>작업을 마치고 완료해 주세요</small>
          </div>
        </div>
        <div class="controls">
          <button class="start" id="start"><span class="play">▶</span><span id="start-label">시작하기</span></button>
        </div>
      </section>

      <section class="history" aria-labelledby="history-title">
        <div class="history-heading">
          <div><p>오늘의 기록</p><h1 id="history-title"><span id="focus-total-min" class="mono">0</span>분 <span id="focus-total-sec" class="mono">0</span>초 집중했어요</h1></div>
          <div class="history-actions"><button id="copy-history" class="clear" hidden>기록 복사</button><button id="clear-history" class="clear" hidden>지우기</button></div>
        </div>
        <ul id="session-list" class="session-list"></ul>
        <p id="empty-history" class="empty">첫 번째 집중 세션을 시작해 보세요.</p>
      </section>
    </main>
    <dialog class="entry-dialog" id="goal-dialog" aria-labelledby="goal-dialog-title">
      <form id="goal-form">
        <p class="dialog-kicker">집중 세션</p>
        <h2 id="goal-dialog-title">이번 집중의 목표는 무엇인가요?</h2>
        <label class="sr-only" for="goal-input">집중 목표</label>
        <input id="goal-input" type="text" maxlength="80" placeholder="예: 프로젝트 제안서 초안 작성" autocomplete="off" />
        <div class="dialog-actions"><button class="dialog-cancel" id="goal-cancel" type="button">취소</button><button class="dialog-submit" type="submit">집중 시작</button></div>
      </form>
    </dialog>
    <dialog class="entry-dialog" id="completion-dialog" aria-labelledby="completion-dialog-title">
      <form id="completion-form">
        <p class="dialog-kicker">집중 완료</p>
        <h2 id="completion-dialog-title">집중 결과를 기록해 주세요</h2>
        <p class="completion-goal"><span>목표</span><strong id="completion-goal-name"></strong></p>
        <label class="completion-result-label" for="completion-input">결과</label>
        <textarea id="completion-input" maxlength="200" placeholder="예: 제안서 초안 3페이지 작성 및 자료 조사 완료" required></textarea>
        <div class="dialog-actions"><button class="dialog-submit" type="submit">기록 완료</button></div>
      </form>
    </dialog>
    <dialog class="entry-dialog" id="edit-session-dialog" aria-labelledby="edit-session-dialog-title">
      <form id="edit-session-form">
        <p class="dialog-kicker">집중 기록 수정</p>
        <h2 id="edit-session-dialog-title">목표와 결과를 수정하세요</h2>
        <label class="edit-session-label" for="edit-goal-input">목표</label>
        <input id="edit-goal-input" type="text" maxlength="80" autocomplete="off" required />
        <label class="edit-session-label" for="edit-result-input">결과</label>
        <textarea id="edit-result-input" maxlength="200" required></textarea>
        <div class="dialog-actions"><button class="dialog-cancel" id="edit-session-cancel" type="button">취소</button><button class="dialog-submit" type="submit">수정 완료</button></div>
      </form>
    </dialog>
    <dialog class="entry-dialog" id="copy-dialog" aria-labelledby="copy-dialog-title">
      <form method="dialog">
        <p class="dialog-kicker">오늘의 기록</p>
        <h2 id="copy-dialog-title">아래 내용을 복사하세요</h2>
        <textarea id="copy-text" readonly></textarea>
        <div class="dialog-actions"><button class="dialog-submit">닫기</button></div>
      </form>
    </dialog>
    <div class="toast" id="copy-toast" role="status" aria-live="polite">기록을 클립보드에 복사했어요.</div>
    <script src="./app.js"></script>
  </body>
</html>
